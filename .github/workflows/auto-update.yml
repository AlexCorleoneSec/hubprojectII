name: Auto Update

on: [push]

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - run: echo "Atualizado em $(date)" >> log.md

      - run: |
          git config user.name "Vinicius Napolitano"
          git config user.email "viniciusnapolitano75@gmail.com"
          git add .
          git commit -m "auto update" || exit 0
          git push
